name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  terraform-fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
      - run: terraform fmt -check -recursive terraform/

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
      - name: Validate modules
        run: |
          find terraform/modules -name '*.tf' -exec dirname {} \; | sort -u | while read dir; do
            echo "--- Validating $dir ---"
            terraform -chdir="$dir" init -backend=false
            terraform -chdir="$dir" validate
          done

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: terraform-linters/setup-tflint@v4
      - run: tflint --init --config .tflint.hcl
      - name: Lint modules
        run: |
          find terraform/modules -name '*.tf' -exec dirname {} \; | sort -u | while read dir; do
            echo "--- Linting $dir ---"
            tflint --chdir="$dir" --config="$(pwd)/.tflint.hcl"
          done

  trivy:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: terraform/
          exit-code: 1
          severity: HIGH,CRITICAL

  pre-commit:
    name: Pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: hashicorp/setup-terraform@v4
      - uses: terraform-linters/setup-tflint@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - run: pip install pre-commit
      - run: tflint --init --config .tflint.hcl
      - name: Install terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://terraform-docs.io/dl/v0.19.0/terraform-docs-v0.19.0-linux-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz terraform-docs
          sudo mv terraform-docs /usr/local/bin/
      - name: Install trivy
        run: |
          sudo apt-get install -y wget apt-transport-https gnupg
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy
      - run: pre-commit run --all-files
